<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI2Git</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="panel">
      <header class="hero">
        <div class="hero-head">
          <h1>AI2Git</h1>
          <a class="settings-link" href="../options/options.html" target="_blank">高级设置</a>
        </div>
        <p>手动/自动同步到 GitHub</p>
        <div id="auto-sync-indicator" class="auto-sync-indicator">自动同步：未启用</div>
      </header>

      <section class="card">
        <h2>会话采集与手动同步</h2>
        <p class="status">GitHub、代理与自动同步参数请在“高级设置”中配置。</p>
        <div class="actions">
          <button id="collect-current">采集当前会话</button>
          <button id="refresh-sessions">刷新会话列表</button>
        </div>
        <div id="session-list" class="session-list"></div>
        <div class="tag-group">
          <div class="group-title">角色标签</div>
          <div id="role-list" class="tag-list"></div>
        </div>
        <div class="tag-group">
          <div class="group-title">业务主题标签</div>
          <div id="business-tag-list" class="tag-list"></div>
        </div>
        <div class="tag-group">
          <div class="group-title">目录标签</div>
          <div id="directory-list" class="tag-list"></div>
        </div>
      </section>

      <section class="card">
        <div class="actions">
          <button id="manual-sync">手动同步</button>
          <button id="run-auto-sync">立即自动同步</button>
        </div>
        <p id="status" class="status"></p>
      </section>

      <section class="card">
        <h2>同步日志</h2>
        <div class="actions">
          <button id="refresh-sync-logs">刷新日志</button>
          <button id="clear-sync-logs">清空日志</button>
        </div>
        <div id="sync-log-list" class="sync-log-list"></div>
      </section>

    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
